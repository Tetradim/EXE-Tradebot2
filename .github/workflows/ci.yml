name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Backend tests and linting
  backend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pyright pytest

      - name: Lint with Ruff
        working-directory: backend
        run: ruff check . --ignore E501
        continue-on-error: true

      - name: Type check with Pyright
        working-directory: backend
        run: pyright --version && pyright . || true
        continue-on-error: true

      - name: Compile check
        working-directory: backend
        run: python -m py_compile server.py

      - name: Run tests
        working-directory: backend
        run: pytest ../tests/ -v --tb=short || true
        continue-on-error: true

  # Frontend tests and linting
  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        working-directory: frontend
        run: yarn lint || true
        continue-on-error: true

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit || true
        continue-on-error: true

      - name: Check for raw env var usage
        working-directory: frontend
        run: |
          echo "Checking for raw process.env usage (should use constants/config.ts)..."
          ! grep -r "process\.env\." app/ --include="*.tsx" --include="*.ts" | grep -v "config.ts" || echo "Warning: Found raw env var usage"
        continue-on-error: true

  # Desktop/Electron checks
  desktop:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Electron JS syntax
        run: |
          node --check electron/main.js
          node --check electron/preload.js
          node --check electron/renderer.js

      - name: Verify security flags in main.js
        run: |
          echo "Checking security configurations..."
          grep -q "contextIsolation.*true" electron/main.js && echo "✓ contextIsolation enabled"
          grep -q "nodeIntegration.*false" electron/main.js && echo "✓ nodeIntegration disabled"
